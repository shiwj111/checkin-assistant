      
<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#3B82F6" />
  <title>打卡助手</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%233B82F6' width='192' height='192' rx='32'/><text x='96' y='130' font-size='100' text-anchor='middle' fill='white'>🕐</text></svg>" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f9; min-height: 100vh; }

    .card { background: white; border-radius: 16px; padding: 24px; margin: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }

    .header { text-align: center; padding: 32px 16px 8px; }
    .header h1 { font-size: 22px; color: #1a1a2e; }
    .header p { color: #888; font-size: 13px; margin-top: 4px; }

    .status-icon {
      width: 72px; height: 72px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; margin: 0 auto 12px; transition: all 0.3s;
    }
    .status-icon.in-office { background: #d1fae5; }
    .status-icon.out-office { background: #fef3c7; }
    .status-icon.no-permission { background: #fee2e2; }
    .status-icon.loading { background: #f1f5f9; }

    .status-text { text-align: center; font-size: 17px; font-weight: 600; color: #1a1a2e; }
    .status-sub { text-align: center; color: #888; font-size: 12px; margin-top: 4px; }

    .detection-bar {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-size: 12px; color: #aaa; margin-top: 8px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
    .dot.active { background: #22c55e; animation: pulse 2s infinite; }
    .dot.warning { background: #f59e0b; }
    .dot.inactive { background: #ccc; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .checkin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .checkin-btn {
      border: none; border-radius: 12px; padding: 18px 12px;
      cursor: pointer; font-size: 15px; font-weight: 600;
      transition: all 0.2s; text-align: center;
    }
    .checkin-btn.morning { background: #fff7ed; color: #ea580c; }
    .checkin-btn.morning.done { background: #d1fae5; color: #059669; }
    .checkin-btn.morning:disabled { opacity: 0.4; cursor: not-allowed; }
    .checkin-btn.evening { background: #f0f9ff; color: #0369a1; }
    .checkin-btn.evening.done { background: #d1fae5; color: #059669; }
    .checkin-btn.evening:disabled { opacity: 0.4; cursor: not-allowed; }

    .checkin-time { font-size: 11px; font-weight: 400; margin-top: 4px; color: #888; }

    .section-title { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 12px; }

    .window-hint {
      background: #f8fafc; border-radius: 8px; padding: 10px 14px;
      font-size: 12px; color: #555; margin-top: 12px;
    }
    .window-hint.active { background: #dbeafe; color: #1d4ed8; }

    .log-section { max-height: 160px; overflow-y: auto; background: #f8fafc; border-radius: 8px; padding: 10px; margin-top: 12px; }
    .log-entry { font-size: 11px; color: #555; padding: 3px 0; border-bottom: 1px solid #eee; }
    .log-entry:last-child { border-bottom: none; }
    .log-entry .t { color: #aaa; margin-right: 6px; }

    .test-btn {
      width: 100%; padding: 13px; border: none; border-radius: 10px;
      background: #3B82F6; color: white; font-size: 14px; cursor: pointer; margin-top: 12px;
    }

    .toast {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: #1a1a2e; color: white; padding: 11px 22px;
      border-radius: 24px; font-size: 13px; z-index: 9999;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="header">
  <h1>🕐 打卡助手</h1>
  <p id="serverStatus">Cloudflare Workers 连接中...</p>
</div>

<!-- 状态卡片 -->
<div class="card" style="text-align:center">
  <div class="status-icon loading" id="statusIcon">📡</div>
  <div class="status-text" id="statusText">正在定位...</div>
  <div class="status-sub" id="statusSub">—</div>
  <div class="detection-bar">
    <div class="dot inactive" id="detectionDot"></div>
    <span id="detectionText">等待定位</span>
  </div>
</div>

<!-- 打卡卡片 -->
<div class="card">
  <div class="section-title">📋 今日打卡</div>
  <div class="checkin-grid">
    <div>
      <div class="checkin-btn morning" id="morningBtn" onclick="manualCheckIn('morning')">
        <div>☀️ 早卡</div>
        <div class="checkin-time" id="morningTime">未打卡</div>
      </div>
    </div>
    <div>
      <div class="checkin-btn evening" id="eveningBtn" onclick="manualCheckIn('evening')">
        <div>🌙 晚卡</div>
        <div class="checkin-time" id="eveningTime">未打卡</div>
      </div>
    </div>
  </div>

  <div class="window-hint" id="windowHint">
    <span id="windowText">当前不在打卡时段</span>
  </div>
</div>

<!-- 日志 -->
<div class="card">
  <div class="section-title">📜 操作日志</div>
  <div class="log-section" id="logSection">
    <div class="log-entry"><span class="t">—</span>打开打卡助手，正在连接...</div>
  </div>
</div>

<!-- 测试 -->
<div class="card">
  <button class="test-btn" id="testBtn" onclick="testNotify()" disabled>🧪 发送测试通知（需先配置 Webhook）</button>
</div>

<div style="height:40px"></div>
<div class="toast" id="toast"></div>

<script>
// ========== 配置（部署后替换为你的 Worker URL） ==========
const WORKER_URL = 'https://checkin-worker.YOUR_SUBDOMAIN.workers.dev';
const USER_ID = 'ou_95ee53259573dfcd85be8f576623a2c1';

// ========== 本地状态 ==========
let watchId = null;
let posTimer = null;
let currentPos = null;
let hasPermission = false;
let inOffice = false;
let serverOnline = false;
let currentAccuracy = null;
let lastDistanceMeters = null;
let geoConfig = {
  officeLat: 22.5093,
  officeLng: 113.9018,
  radiusMeters: 50,
};

const state = {
  morning: null,
  evening: null,
  lastLocationUpdate: null,
};

// ========== 工具 ==========
function fmtHMS(d) {
  if (!d) return '—';
  const D = new Date(d);
  return `${D.getHours().toString().padStart(2,'0')}:${D.getMinutes().toString().padStart(2,'0')}:${D.getSeconds().toString().padStart(2,'0')}`;
}

function isInMorningWindow() {
  const now = new Date();
  const m = now.getHours()*60+now.getMinutes();
  return m >= 9*60+30 && m < 10*60;
}
function isInEveningWindow() {
  const now = new Date();
  const m = now.getHours()*60+now.getMinutes();
  return m >= 19*60 && m < 21*60;
}

function getCurrentGeoConfig() {
  return geoConfig || { officeLat: 22.5093, officeLng: 113.9018, radiusMeters: 50 };
}

function syncGeofence(result) {
  if (!result || !result.geofence) return;
  const lat = Number(result.geofence.officeLat);
  const lng = Number(result.geofence.officeLng);
  const radius = Number(result.geofence.radiusMeters);
  if (Number.isFinite(lat) && Number.isFinite(lng) && Number.isFinite(radius)) {
    geoConfig = { officeLat: lat, officeLng: lng, radiusMeters: radius };
  }
}

function isWithinRadius(lat, lng) {
  const geo = getCurrentGeoConfig();
  const R = 6371000;
  const dLat = (lat - geo.officeLat)*Math.PI/180;
  const dLng = (lng - geo.officeLng)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(geo.officeLat*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)) <= geo.radiusMeters;
}

function distanceFromOffice(lat, lng) {
  const geo = getCurrentGeoConfig();
  const R = 6371000;
  const dLat = (lat - geo.officeLat)*Math.PI/180;
  const dLng = (lng - geo.officeLng)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(geo.officeLat*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function addLog(msg) {
  const sec = document.getElementById('logSection');
  const d = new Date();
  const e = document.createElement('div');
  e.className = 'log-entry';
  e.innerHTML = `<span class="t">${fmtHMS(d)}</span>${msg}`;
  sec.insertBefore(e, sec.firstChild);
  while (sec.children.length > 30) sec.removeChild(sec.lastChild);
}

// ========== API 调用 ==========
async function api(path, method='GET', body=null) {
  const url = `${WORKER_URL}${path}`;
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const resp = await fetch(url, opts);
    return await resp.json();
  } catch(e) {
    console.error('API error:', e);
    return null;
  }
}

// ========== UI 更新 ==========
function updateUI() {
  // 状态图标
  const icon = document.getElementById('statusIcon');
  const text = document.getElementById('statusText');
  const sub  = document.getElementById('statusSub');
  const distance = currentPos
    ? (Number.isFinite(lastDistanceMeters) ? lastDistanceMeters : distanceFromOffice(currentPos.lat,currentPos.lng))
    : null;
  const accuracyText = Number.isFinite(currentAccuracy) ? ` | 精度±${Math.round(currentAccuracy)}m` : '';

  if (!hasPermission) {
    icon.className = 'status-icon no-permission';
    icon.textContent = '⚠️';
    text.textContent = '需要定位权限';
    sub.textContent  = '请允许定位';
  } else if (!serverOnline) {
    icon.className = 'status-icon loading';
    icon.textContent = '📡';
    text.textContent = '服务器连接中...';
    sub.textContent  = distance !== null ? `已获取位置 ${Math.round(distance)}m${accuracyText}` : '定位已获取';
  } else if (inOffice) {
    icon.className = 'status-icon in-office';
    icon.textContent = '🏢';
    text.textContent = '已进入公司围栏';
    sub.textContent  = distance !== null ? `距公司 ${Math.round(distance)}m${accuracyText}` : '';
  } else {
    icon.className = 'status-icon out-office';
    icon.textContent = '📍';
    text.textContent = '不在公司';
    sub.textContent  = distance !== null ? `距公司 ${Math.round(distance)}m${accuracyText}` : '正在获取位置...';
  }

  // 检测点
  const dot = document.getElementById('detectionDot');
  const dotText = document.getElementById('detectionText');
  const windowActive = isInMorningWindow() || isInEveningWindow();
  if (hasPermission && serverOnline && windowActive) {
    dot.className = 'dot active';
    dotText.textContent = '每30秒上传位置';
  } else if (!windowActive) {
    dot.className = 'dot inactive';
    dotText.textContent = '当前不在监控时段';
  } else if (hasPermission) {
    dot.className = 'dot warning';
    dotText.textContent = '等待服务器连接';
  }

  // 早卡
  const mBtn = document.getElementById('morningBtn');
  const mTime = document.getElementById('morningTime');
  if (state.morning) {
    mBtn.className = 'checkin-btn morning done';
    mTime.textContent = fmtHMS(state.morning.time);
  } else {
    mBtn.className = 'checkin-btn morning';
    mTime.textContent = '点击打卡';
  }

  // 晚卡
  const eBtn = document.getElementById('eveningBtn');
  const eTime = document.getElementById('eveningTime');
  if (state.evening) {
    eBtn.className = 'checkin-btn evening done';
    eTime.textContent = fmtHMS(state.evening.time);
  } else {
    eBtn.className = 'checkin-btn evening';
    eTime.textContent = '点击打卡';
  }

  // 时段提示
  const hint = document.getElementById('windowHint');
  const hintText = document.getElementById('windowText');
  if (isInMorningWindow()) {
    hint.className = 'window-hint active';
    hintText.textContent = '☀️ 现在是早卡时段（9:30-10:00），进入公司会自动记录';
  } else if (isInEveningWindow()) {
    hint.className = 'window-hint active';
    hintText.textContent = '🌙 现在是晚卡时段（19:00-21:00），离开公司且工作超9.5h会自动记录';
  } else {
    hint.className = 'window-hint';
    hintText.textContent = '⏰ 当前不在打卡时段。打开 App 期间位置会持续上传，云端自动判断';
  }
}

// ========== 定位 ==========
async function requestLocation() {
  if (!navigator.geolocation) {
    addLog('⚠️ 浏览器不支持定位');
    return;
  }

  try {
    const pos = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: true, timeout: 10000, maximumAge: 0
      });
    });

    currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    currentAccuracy = pos.coords.accuracy;
    lastDistanceMeters = null;
    hasPermission = true;
    inOffice = isWithinRadius(currentPos.lat, currentPos.lng);
    addLog(`✅ 定位成功 ${inOffice ? '🏢 在公司' : '📍 不在公司'} (距${Math.round(distanceFromOffice(currentPos.lat,currentPos.lng))}m, 精度±${Math.round(currentAccuracy)}m)`);
    if (currentAccuracy > 200) {
      addLog('⚠️ 当前定位精度较低，建议在 iPhone 设置中开启“精确位置”');
    }
    updateUI();

    // 持续监听
    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        currentAccuracy = pos.coords.accuracy;
        lastDistanceMeters = null;
        inOffice = isWithinRadius(currentPos.lat, currentPos.lng);
        updateUI();
      },
      (err) => addLog(`⚠️ 定位: ${err.message}`),
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
    );

  } catch(e) {
    hasPermission = false;
    addLog('⚠️ 定位权限被拒绝');
    updateUI();
  }
}

// ========== 打卡 ==========
async function manualCheckIn(type) {
  if (!currentPos) {
    showToast('请先获取位置');
    return;
  }

  const record = {
    userId: USER_ID,
    type,
    time: new Date().toISOString(),
    lat: currentPos.lat,
    lng: currentPos.lng,
  };

  const result = await api('/api/record', 'POST', record);
  if (result && result.success) {
    syncGeofence(result);
    state[type] = result.record;
    const label = type === 'morning' ? '☀️ 早卡' : '🌙 晚卡';
    const dist = Number.isFinite(result.distance) ? Math.round(result.distance) : '?';
    addLog(`${label} 已记录 (距公司${dist}m)`);
    showToast(`${label} 打卡成功！`);
    updateUI();
  } else {
    showToast('打卡失败，请检查网络');
  }
}

// ========== 位置上传循环 ==========
async function uploadLocationLoop() {
  if (!currentPos || !serverOnline) return;

  const windowActive = isInMorningWindow() || isInEveningWindow();
  if (!windowActive) return;

  const result = await api('/api/location', 'POST', {
    userId: USER_ID,
    lat: currentPos.lat,
    lng: currentPos.lng,
  });

  if (result && result.success) {
    serverOnline = true;
    document.getElementById('serverStatus').textContent = '🟢 云端运行中';
    syncGeofence(result);

    if (result.actions && result.actions.length > 0) {
      result.actions.forEach(a => addLog(a));
    }

    if (Number.isFinite(result.distance)) {
      lastDistanceMeters = result.distance;
    }

    if (result.inOffice !== undefined) {
      inOffice = result.inOffice;
    }
  } else {
    serverOnline = false;
    document.getElementById('serverStatus').textContent = '🔴 服务器连接失败';
  }

  updateUI();
}

// ========== 测试通知 ==========
async function testNotify() {
  document.getElementById('testBtn').textContent = '发送中...';
  const result = await api('/api/test', 'POST');
  if (result && result.success) {
    showToast('测试通知已发送！');
    addLog('🧪 测试通知已发送');
  } else {
    showToast('发送失败，请检查 Webhook 配置');
  }
  document.getElementById('testBtn').textContent = '🧪 发送测试通知';
}

// ========== 初始化 ==========
async function init() {
  addLog('🚀 打卡助手启动');

  // 先定位
  await requestLocation();

  // 测试服务器连接
  const health = await fetch(`${WORKER_URL}/health`).then(r=>r.ok).catch(()=>false);
  if (health) {
    serverOnline = true;
    document.getElementById('serverStatus').textContent = '🟢 云端运行中';
    document.getElementById('testBtn').disabled = false;
    document.getElementById('testBtn').textContent = '🧪 发送测试通知';
    addLog('✅ Cloudflare Worker 已连接');

    // 拉取后端围栏配置，避免前后端坐标不一致
    const cfg = await api('/api/config');
    if (cfg && cfg.geofence) {
      syncGeofence(cfg);
      addLog(`📌 围栏配置: ${geoConfig.officeLat.toFixed(6)}, ${geoConfig.officeLng.toFixed(6)} / 半径${Math.round(geoConfig.radiusMeters)}m`);
    }

    // 获取今日状态
    const status = await api(`/api/status?userId=${USER_ID}`);
    if (status) {
      syncGeofence(status);
      if (Number.isFinite(status.distance)) {
        lastDistanceMeters = status.distance;
      }
      if (status.inOffice !== undefined && status.inOffice !== null) {
        inOffice = status.inOffice;
      }
      if (status.morning) { state.morning = status.morning; addLog(`☀️ 早卡已记录 ${fmtHMS(status.morning.time)}`); }
      if (status.evening) { state.evening = status.evening; addLog(`🌙 晚卡已记录 ${fmtHMS(status.evening.time)}`); }
    }
  } else {
    serverOnline = false;
    document.getElementById('serverStatus').textContent = '🔴 Worker 未部署或配置错误';
    addLog('⚠️ Cloudflare Worker 未连接，请先部署');
  }

  updateUI();

  // 每30秒上传位置
  posTimer = setInterval(uploadLocationLoop, 30000);
  // 立即执行一次
  if (hasPermission) setTimeout(uploadLocationLoop, 2000);

  // Service Worker
  if ('serviceWorker' in navigator) {
    try {
      await navigator.serviceWorker.register('/sw.js');
      addLog('✅ Service Worker 已注册');
    } catch(e) { /* ignore */ }
  }
}

// 每天重置
(function resetDaily() {
  const today = new Date().toDateString();
  if (localStorage.getItem('lastDate') !== today) {
    localStorage.removeItem('morning');
    localStorage.removeItem('evening');
    localStorage.setItem('lastDate', today);
  }
})();

init();
</script>
</body>
</html>
